<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Description }}</title>

    <style>
        * {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        head, body {
            background: #171717;
            color: #fff;
        }

        body {
            padding: 20px;
        }

        header {
            display: flex;
            flex-direction: row;
            gap: 10px;
            margin-bottom: 20px;
        }

        header div:not(.img_container) {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        header h1 {
            border-bottom: 1px solid rgba(255, 255, 255, .8);
            margin-bottom: 5px;
        }

        header .img_container {
            height: 75px;
            width: 112.5px;

            display: flex;
            items-center: center;
            justify-content: center;
        }

        .table {
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            text-align: left;
        }

        table tbody tr:nth-child(even) {
            background: #1f1f1f;
        }

        a {
            color: white;
        }

        .message {
            display: flex;
            flex-direction: column;

            padding: 10px;
            border: 1px solid #DC143C;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <div class="img_container">
            <img src={{ .Icon }} alt="Logo" />
        </div>
        <div>
            <h1>{{ .Title }}</h1>
            <span>{{ .Description }}</span>
        </div>
    </header>

    {{ if .Message }}
        <p class="message">
            {{ range $_, $msg := .Message }}
                {{ $msg }}
            {{ end }}
        </p>
    {{ end }}

    <section class="table">
        <table>
            <thead>
                <tr>
                    <th>Service</th>
                    <th>Status</th>
                    <th>Uptime</th>
                </tr>
            </thead>
            <tbody>
                {{range .Services}}
                    <tr>
                        <td>
                            {{if .ShowURL}}
                                <a href={{.URL}} target="_blank">{{.Name}}</a>
                            {{else}}
                                {{.Name}}
                            {{end}}
                        </td>
                        {{if .Status}}
                            <td>UP</td>
                        {{else}}
                            <td>DOWN</td>
                        {{end}}
                        <td>{{ percent .Up .Total }}%</td>
                    </tr>
                {{end}}
            </tbody>
        </table>
    </section>
</body>
</html>
